name: Deploy Vue to GitHub Pages

on:
  push:
    branches:
      - master  # 💡 觸發條件：當你 git push 到 master 分支時，會自動啟動此自動化流程

# 💡 賦予 GitHub Actions 寫入（建立 gh-pages 分支）的權限
permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Install Node.js 🟢
        uses: actions/setup-node@v4
        with:
          node-version: 20 # 💡 指定穩定的 Node.js 版本

      - name: Install and Build 🔧
        run: |
          npm install
          npm run build:test  # 💡 執行 Vue 打包，預設會產出包含網頁靜態檔案的 dist 資料夾

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist  # 💡 核心：指定把打包好的 dist 資料夾上傳
          branch: gh-pages  # 💡 核心：將內容推送到 gh-pages 分支做為網頁來源
